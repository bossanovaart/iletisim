<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bossnova Art | Digital Link Tree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 20, 0.6);
            --primary-gold: #c5a028;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Kaydırmayı tamamen engellemek için kritik ayarlar */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh; /* Mobil tarayıcılar için dinamik yükseklik */
            overflow: hidden; /* Kaydırmayı kapatır */
            touch-action: none; /* Dokunmatik kaydırmayı engeller */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0a0a0a, #1a1a1a, #111111, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .header {
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .header img {
            width: 100%;
            max-width: 220px; /* Mobilde biraz küçülttük sığması için */
            filter: drop-shadow(0 10px 20px rgba(197, 160, 40, 0.15));
            animation: float 6s ease-in-out infinite;
        }

        @media (min-width: 600px) {
            .header img { max-width: 400px; }
            .links-grid { grid-template-columns: 1fr 1fr; }
            html, body { overflow: auto; touch-action: auto; } /* PC'de gerekirse kaydırabilir */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .link-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            text-align: left;
            gap: 15px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .link-item:hover {
            border-color: rgba(197, 160, 40, 0.5);
            transform: translateY(-3px);
            background: rgba(30, 30, 30, 0.8);
        }

        .icon-box {
            width: 42px;
            height: 42px;
            background: linear-gradient(145deg, #1f1f1f, #141414);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--primary-gold);
            flex-shrink: 0;
        }

        .content b {
            display: block;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .content span {
            font-size: 11px;
            color: var(--text-dim);
        }

        .arrow {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.1);
            margin-left: auto;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header">
            <img src="https://bossnovaart.com/cdn/shop/files/logo_2_0972e45c-5a93-4231-ac01-8e5528ce6672.png?v=1776255344&width=440" alt="Bossnova Art">
        </div>

        <div class="links-grid">
            <a href="https://bossnovaart.com" target="_blank" class="link-item">
                <div class="icon-box"><i class="fas fa-globe"></i></div>
                <div class="content">
                    <b>Web Sitemiz</b>
                    <span>bossnovaart.com</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://www.instagram.com/bossanovarting/" target="_blank" class="link-item">
                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                <div class="content">
                    <b>Instagram</b>
                    <span>@bossanovarting</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="tel:+905449583083" class="link-item">
                <div class="icon-box"><i class="fas fa-phone"></i></div>
                <div class="content">
                    <b>Bizi Arayın</b>
                    <span>+90 (544) 958 30 83</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="tel:+905442893885" class="link-item">
                <div class="icon-box"><i class="fas fa-phone"></i></div>
                <div class="content">
                    <b>Bizi Arayın</b>
                    <span>+90 (544) 289 38 85</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
        </div>
    </div>

</body>
</html>
